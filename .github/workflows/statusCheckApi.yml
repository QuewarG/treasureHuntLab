name: ML API CI

on:
  pull_request:
    branches: [trunk]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Instalar Docker
        uses: docker/setup-buildx-action@v2

      - name: Construir imagen Docker
        run: docker build -t ml-api .

      - name: Ejecutar contenedor
        run: docker run -d -p 8000:80 --name ml-api-container ml-api

      - name: Esperar arranque del API
        run: sleep 10

      - name: Probar predicción
        run: curl -f http://localhost:8080/ | grep "Treasure Hunt"

      - name: Detener contenedor
        run: docker stop ml-api-container && docker rm ml-api-container
