name: ML API CI

on:
  pull_request:
    branches: [trunk]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Instalar Docker
        uses: docker/setup-buildx-action@v2

      - name: Construir imagen Docker
        run: docker build -t ml-api .

      - name: Ejecutar contenedor
        run: docker run -d -p 8000:8000 --name ml-api-container ml-api

      - name: Esperar arranque del API
        run: sleep 10

      - name: Probar predicción
        run: |
          curl -X POST http://localhost:8000/prediction/ \
            -H "Content-Type: application/json" \
            -d '{"hour": 10, "day": 3}'

      - name: Detener contenedor
        run: docker stop ml-api-container && docker rm ml-api-container
